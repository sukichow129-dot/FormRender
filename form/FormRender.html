<!DOCTYPE html>
<head> 
    <title>Assignment01FormRender</title>
    <link rel="stylesheet" href="FormRender.css">
</head> 

<body> 
    <fieldset>
        <legend>General Info</legend>
        <div>
            <label for="text" >Item Name</label>
            <input type="text" id="itemName" name="itemName" value="" size="50" maxlength="60"/>
        </div>

         <div>
            <label for="desc">Description</label>
            <textarea name="desc" id="itemDescription" rows="5" cols="50"></textarea>
        </div>

        <div>
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="-1"></option>
                <option value="0" selected>notSpecified</option>
                <option value="1">consumption</option>
                <option value="2">household</option>
                <option value="3">electronic</option>
                <option value="4">gadget</option>
            </select>
        </div>
    </fieldset>
    
    <fieldset>
        <legend>Misc.</legend>
        <div>
            <label for="text" >inventoryAmount</label>
            <input type="text" id="inventoryAmount" name="inventoryAmount" value="" size="50" maxlength="60"/>
        </div>

        <div>
            <label for="text" >List Price</label>
            <input type="text" id="listPrice" name="listPrice" value="" size="50" maxlength="60"/>
        </div>

        <div>
            <label for="checkbox">Available Stores</label>
            <input type="checkbox" id="c1" name="availableStore[]" value="Bangkok">Bangkok
            <input type="checkbox" id="c2" name="availableStore[]" value="Pattaya">Pattaya
            <input type="checkbox" id="c3" name="availableStore[]" value="Phuket">Phuket
        </div>

        <div>
            <label for="radio">Available Stores</label>
            <input type="radio" id="r1" name="status" value="Active"/>Active
            <input type="radio" id="r2" name="status" value="Inactive"/>Inactive
        </div>
    </fieldset>

    <fieldset>
        <legend>Staff</legend>
        <div>
            <label for="email">Staff Email</label>
            <input type="email" id="email" name="email">
        </div>
    </fieldset>
    
    <form action="form_submit.html" method="post">
        <input type="submit" id="submit" name="submit" value="Submit Form">
    </form>

</body> 

</html>
